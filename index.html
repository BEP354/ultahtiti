<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
font-family:'Poppins',sans-serif;
margin:0;
padding:0;
}

body{
background:linear-gradient(135deg,#667eea 0%,#764ba2 50%,#f093fb 100%);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.countdown-container{
text-align:center;
color:white;
position:relative;
z-index:10;
}

.countdown-container::before{
content:'';
position:fixed;
width:400px;
height:400px;
background:rgba(255,255,255,0.1);
border-radius:50%;
top:-50px;
left:-100px;
animation:float 6s ease-in-out infinite;
}

.countdown-container::after{
content:'';
position:fixed;
width:300px;
height:300px;
background:rgba(255,255,255,0.08);
border-radius:50%;
bottom:-50px;
right:-50px;
animation:float 8s ease-in-out infinite reverse;
}

.countdown-title{
font-size:60px;
font-weight:800;
margin-bottom:20px;
}

.countdown-subtitle{
font-size:24px;
margin-bottom:50px;
opacity:0.9;
}

.countdown-timer{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
max-width:600px;
margin:0 auto 50px;
}

.countdown-box{
background:rgba(255,255,255,0.15);
padding:30px;
border-radius:20px;
backdrop-filter:blur(10px);
border:2px solid rgba(255,255,255,0.2);
}

.countdown-number{
font-size:48px;
font-weight:800;
display:block;
margin-bottom:10px;
}

.countdown-label{
font-size:14px;
text-transform:uppercase;
letter-spacing:2px;
}

.countdown-button{
display:inline-block;
background:white;
color:#667eea;
padding:18px 50px;
border-radius:50px;
font-weight:700;
border:none;
font-size:18px;
cursor:pointer;
}

.countdown-button:disabled{
opacity:0.5;
cursor:not-allowed;
}

.emoji-float{
font-size:100px;
animation:bounce 2s ease-in-out infinite;
margin-bottom:20px;
}

.particles{
position:fixed;
width:10px;
height:10px;
background:white;
border-radius:50%;
pointer-events:none;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(30px)}
}

@keyframes bounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-30px)}
}

@media(max-width:768px){

.countdown-title{
font-size:40px;
}

.countdown-subtitle{
font-size:18px;
}

.countdown-timer{
grid-template-columns:repeat(2,1fr);
}

.countdown-number{
font-size:36px;
}

}
</style>
</head>

<body>

<div class="countdown-container">

<div class="emoji-float">🎂</div>

<h1 class="countdown-title">
Perayaan Spesial Ulang Tahun ke-22
</h1>

<p class="countdown-subtitle">
Tunggu sampai Timer abis ya:
</p>

<div class="countdown-timer">

<div class="countdown-box">
<span class="countdown-number" id="days">00</span>
<span class="countdown-label">Hari</span>
</div>

<div class="countdown-box">
<span class="countdown-number" id="hours">00</span>
<span class="countdown-label">Jam</span>
</div>

<div class="countdown-box">
<span class="countdown-number" id="minutes">00</span>
<span class="countdown-label">Menit</span>
</div>

<div class="countdown-box">
<span class="countdown-number" id="seconds">00</span>
<span class="countdown-label">Detik</span>
</div>

</div>

<button class="countdown-button" id="enterBtn" onclick="enterWebsite()" disabled>
Masuk
</button>

<p style="margin-top:30px;font-size:14px;opacity:0.8">
Tunggu hingga Waktu selesai
</p>

</div>

<script>

function startCountdown(){

const targetDate=new Date('2026-03-14T00:00:00').getTime();

function updateCountdown(){

const now=new Date().getTime();
const difference=targetDate-now;

if(difference>0){

const days=Math.floor(difference/(1000*60*60*24));
const hours=Math.floor((difference%(1000*60*60*24))/(1000*60*60));
const minutes=Math.floor((difference%(1000*60*60))/(1000*60));
const seconds=Math.floor((difference%(1000*60))/1000);

document.getElementById('days').textContent=String(days).padStart(2,'0');
document.getElementById('hours').textContent=String(hours).padStart(2,'0');
document.getElementById('minutes').textContent=String(minutes).padStart(2,'0');
document.getElementById('seconds').textContent=String(seconds).padStart(2,'0');

}else{

document.getElementById('days').textContent='00';
document.getElementById('hours').textContent='00';
document.getElementById('minutes').textContent='00';
document.getElementById('seconds').textContent='00';

document.getElementById('enterBtn').disabled=false;

}

}

updateCountdown();
setInterval(updateCountdown,1000);

}

function enterWebsite(){
window.location.href="home.html";
}

window.addEventListener('load',startCountdown);

function createParticles(){

const particleCount=30;

for(let i=0;i<particleCount;i++){

const particle=document.createElement('div');

particle.className='particles';

particle.style.left=Math.random()*100+'%';
particle.style.top=Math.random()*100+'%';

particle.style.animation=`float ${Math.random()*3+2}s ease-in-out infinite`;

particle.style.animationDelay=Math.random()*2+'s';

document.body.appendChild(particle);

}

}

window.addEventListener('load',createParticles);

</script>

</body>
</html>
