<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Precious Memories</title>

    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --royal-gold: #d4af37;
            --soft-pink: #fdf2f2;
            --deep-rose: #d86c7a;
            --bg-gradient: linear-gradient(135deg, #fffafa 0%, #fdf2f2 100%);
        }

        body {
            background: var(--bg-gradient);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* BACKGROUND ANIMATION (Kertas Berterbangan) */
        #confetti-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .confetti-piece {
            position: absolute;
            width: 8px;
            height: 12px;
            background: var(--royal-gold);
            opacity: 0.6;
            border-radius: 2px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        /* HERO SECTION */
        .hero {
            text-align: center;
            padding: 60px 20px 20px;
            position: relative;
            z-index: 2;
        }

        .hero h1 {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(40px, 8vw, 72px);
            color: var(--deep-rose);
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        .hero p {
            font-size: clamp(14px, 2.5vw, 18px);
            color: #8b6f6f;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 10px;
            font-weight: 300;
        }

        .ornament {
            width: 120px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--royal-gold), transparent);
            margin: 20px auto;
        }

        /* CAROUSEL SECTION */
        .carousel-section {
            position: relative;
            z-index: 2;
            padding: 60px 0; 
        }

        /* EDGE FADE */
        .carousel-section:before,
        .carousel-section:after {
            content: "";
            position: absolute;
            top: 0; width: 15%; height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        .carousel-section:before {
            left: 0;
            background: linear-gradient(to right, #fffafa 20%, transparent);
        }

        .carousel-section:after {
            right: 0;
            background: linear-gradient(to left, #fffafa 20%, transparent);
        }

        .row {
            overflow: visible;
            margin: 20px 0;
            display: flex;
        }

        .track {
            display: flex;
            gap: 25px;
            width: max-content;
            padding: 30px 0; 
        }

        /* PHOTO CARD */
        .photo-card {
            width: clamp(180px, 20vw, 280px);
            height: clamp(240px, 26vw, 360px);
            border-radius: 20px;
            overflow: hidden;
            flex-shrink: 0;
            position: relative;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 4px solid white;
            background: white;
        }

        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        /* OVERLAY */
        .photo-card:after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 50%);
            z-index: 1;
        }

        .photo-title {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            z-index: 2;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }

        /* SMART HOVER INTERACTION */
        .row:hover .photo-card {
            opacity: 0.7;
            transform: scale(0.95);
            filter: blur(1px);
        }

        .photo-card:hover {
            transform: scale(1.08) translateY(-20px) !important;
            opacity: 1 !important;
            filter: blur(0) !important;
            z-index: 10;
            box-shadow: 0 20px 40px rgba(216,108,122,0.3);
            border-color: var(--royal-gold);
        }

        .photo-card:hover img {
            transform: scale(1.1);
        }

        /* ANIMATIONS */
        .left .track { animation: scrollLeft linear infinite; }
        .right .track { animation: scrollRight linear infinite; }

        @keyframes scrollLeft {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        @keyframes scrollRight {
            from { transform: translateX(-50%); }
            to { transform: translateX(0); }
        }

        /* BUTTON STYLE */
        #music-toggle {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 999;
            background: #d86c7a;
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            font-size: 18px;
        }

        .back-home {
            text-align: center;
            margin-top: 40px;
            padding-bottom: 40px;
        }

        .back-home a {
            color: #d86c7a;
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* MOBILE OPTIMIZATION */
        @media (max-width: 600px) {
            .hero { padding: 40px 15px 10px; }
            .carousel-section { padding: 20px 0; }
            .track { gap: 15px; padding: 20px 0; }
            .row { margin: 10px 0; }
            .photo-card:hover {
                transform: scale(1.03) translateY(-10px) !important;
            }
            .carousel-section:before, .carousel-section:after { width: 10%; }
        }
    </style>
</head>
<body>

    <div id="confetti-container"></div>

    <button id="music-toggle">🎵</button>

    <div class="hero">
        <h1>Memories Kebersamaan</h1>
        <div class="ornament"></div>
        <p>Setiap foto punya cerita, setiap cerita punya makna</p>
    </div>

    <section class="carousel-section">
        <div class="row left">
            <div class="track">
                <div class="photo-card"><img src="images/1.jpg"><div class="photo-title">First Date</div></div>
                <div class="photo-card"><img src="images/3.jpg"><div class="photo-title">Seminar PKL</div></div>
                <div class="photo-card"><img src="images/2.jpg"><div class="photo-title">Yogyakarta</div></div>
                <div class="photo-card"><img src="images/4.jpg"><div class="photo-title">Bukber Ebony</div></div>
                <div class="photo-card"><img src="images/5.jpg"><div class="photo-title">Idul Fitri 2025</div></div>
            </div>
        </div>

        <div class="row right">
            <div class="track">
                <div class="photo-card"><img src="images/6.jpg"><div class="photo-title">Ndaki Date</div></div>
                <div class="photo-card"><img src="images/7.jpg"><div class="photo-title">Maridjah</div></div>
                <div class="photo-card"><img src="images/8.jpg"><div class="photo-title">Semhas</div></div>
                <div class="photo-card"><img src="images/9.jpg"><div class="photo-title">Cafe Baturaden</div></div>
                <div class="photo-card"><img src="images/10.jpg"><div class="photo-title">Scooter</div></div>
            </div>
        </div>

        <div class="row left">
            <div class="track">
                <div class="photo-card"><img src="images/11.jpg"><div class="photo-title">Waktu KKN</div></div>
                <div class="photo-card"><img src="images/12.jpg"><div class="photo-title">Gunung Beser</div></div>
                <div class="photo-card"><img src="images/13.jpg"><div class="photo-title">Wisuda</div></div>
                <div class="photo-card"><img src="images/14.jpg"><div class="photo-title">Semarang</div></div>
                <div class="photo-card"><img src="images/15.jpg"><div class="photo-title">Photo Studio</div></div>
            </div>
        </div>

        <audio id="bg-music" loop>
            <source src="music/music.mp3" type="audio/mpeg">
        </audio>

        <div class="back-home">
            <a href="index.html">← Back Home</a>
        </div>
    </section>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const music = document.getElementById("bg-music");
            const toggle = document.getElementById("music-toggle");

            // mencoba autoplay
            music.play().catch(() => {
                document.body.addEventListener("click", () => {
                    music.play();
                }, { once: true });
            });

            // tombol play pause
            toggle.addEventListener("click", () => {
                if (music.paused) {
                    music.play();
                    toggle.innerHTML = "🔊";
                } else {
                    music.pause();
                    toggle.innerHTML = "🎵";
                }
            });

            // 1. Create Confetti Particles
            const confettiContainer = document.getElementById('confetti-container');
            const colors = ['#d4af37', '#d86c7a', '#ffc0cb', '#ffffff'];

            function createConfetti() {
                for (let i = 0; i < 40; i++) {
                    const piece = document.createElement('div');
                    piece.className = 'confetti-piece';
                    piece.style.width = Math.random() * 8 + 4 + 'px';
                    piece.style.height = Math.random() * 10 + 6 + 'px';
                    piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    piece.style.left = Math.random() * 100 + 'vw';
                    piece.style.animationDuration = Math.random() * 3 + 4 + 's';
                    piece.style.animationDelay = Math.random() * 5 + 's';
                    confettiContainer.appendChild(piece);
                }
            }
            createConfetti();

            // 2. Duplicate Track for Infinite Effect & Auto Speed
            function initCarousels() {
                document.querySelectorAll(".track").forEach(track => {
                    if (track.children.length < 15) {
                        track.innerHTML += track.innerHTML;
                    }
                    const duration = track.scrollWidth / 70; 
                    track.style.animationDuration = duration + "s";
                });
            }
            initCarousels();

            // 3. Interaction: Pause on Hover
            document.querySelectorAll(".row").forEach(row => {
                row.addEventListener('mouseenter', () => {
                    row.querySelector(".track").style.animationPlayState = 'paused';
                });
                row.addEventListener('mouseleave', () => {
                    row.querySelector(".track").style.animationPlayState = 'running';
                });
            });
        });
    </script>
</body>
</html>
